    <!-- Font Awesome για το εικονίδιο του αστεριού που πέφτει -->

    <style id="CHOICES_ID">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Τα αστέρια που πέφτουν */
        .star {
            position: absolute;
            top: -20px;
            color: white;
            animation: animate 5s linear forwards;
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
        }

        .star::before {
            content: '\f005';
            text-shadow: 0 0 5px black,
                         0 0 20px white,
                         0 0 50px white;
        }

        @keyframes animate {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }
            70% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(100vh) scale(0.5) rotate(360deg);
                opacity: 0;
            }
        }

        /* Το κουμπί */
        button {
            position: relative;
            margin-top: 4rem;
            margin-left: 1.5rem;
            padding: 8px 15px;
            background-image: url('https://i.pinimg.com/originals/95/9f/b1/959fb1f51bc1026ace27acede55e1bc8.gif');
            background-size: cover;
            font-size: 14px;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 0 15px #ffffffa4;
            transition: all .3s ease-in-out;
            z-index: 10;
        }

        button:active {
            transform: translateX(0px) rotate(25deg);
            box-shadow: 0 0 5px #323232a4;
            transition: all .1s ease-in-out;
        }

      /* SVG Αστέρια μέσα στο κουμπί */
.star-1, .star-2, .star-3, .star-4, .star-5, .star-6 {
    position: absolute;
    width: auto;
    filter: drop-shadow(0 0 0 #fffdef);
    z-index: -5;
    opacity: 0; /* <-- ΠΡΟΣΘΕΤΕΤΕ ΑΥΤΗ ΤΗ ΓΡΑΜΜΗ */
}

        .star-1 { top: 20%; left: 20%; width: 25px; transition: all 1s cubic-bezier(0.05, 0.83, 0.43, 0.96); }
        .star-2 { top: 45%; left: 45%; width: 15px; transition: all 1s cubic-bezier(0, 0.4, 0, 1.01); }
        .star-3 { top: 40%; left: 40%; width: 5px; transition: all 1s cubic-bezier(0, 0.4, 0, 1.01); }
        .star-4 { top: 20%; left: 40%; width: 8px; transition: all .8s cubic-bezier(0, 0.4, 0, 1.01); }
        .star-5 { top: 25%; left: 45%; width: 15px; transition: all .6s cubic-bezier(0, 0.4, 0, 1.01); }
        .star-6 { top: 5%; left: 50%; width: 5px; transition: all .8s ease; }

        button:hover {
            background-image: url('https://media.tenor.com/DW6NVk8EJQ0AAAAM/shooting-star-the-smurfs.gif');
            background-size: cover;
            color: #FFFFFF;
            box-shadow: 0 0 25px #0e3a3a;
            border: 1px solid #FFF;
            scale: 1.1;
        }

        /* Hover εφέ για τα SVG αστέρια */
button:hover .star-1 { opacity: 1; top: -80%; left: -30%; width: 25px; filter: drop-shadow(0 0 10px #fffdef); z-index: 2; }
button:hover .star-2 { opacity: 1; top: -25%; left: 10%; width: 15px; filter: drop-shadow(0 0 10px #fffdef); z-index: 2; }
button:hover .star-3 { opacity: 1; top: 55%; left: 25%; width: 5px; filter: drop-shadow(0 0 10px #fffdef); z-index: 2; }
button:hover .star-4 { opacity: 1; top: 30%; left: 80%; width: 8px; filter: drop-shadow(0 0 10px #fffdef); z-index: 2; }
button:hover .star-5 { opacity: 1; top: 25%; left: 115%; width: 15px; filter: drop-shadow(0 0 10px #fffdef); z-index: 2; }
button:hover .star-6 { opacity: 1; top: 5%; left: 60%; width: 5px; filter: drop-shadow(0 0 10px #fffdef); z-index: 2; }


        .fil0 {
            fill: #FFFDEF;
        }
/* Το container του φεγγαριού επάνω δεξιά */
#moon-container {
    position: absolute;
    top: 5rem;
    right: 2rem;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    /* Ρεαλιστική εικόνα πανσελήνου */
    background-image: url('https://xatimg.com/image/wN0GwHPQejWO.png');
    background-size: cover;
    box-shadow: 0 0 20px 5px rgba(255, 140, 0, 0.4);
animation: pulseGlow 4s ease-in-out infinite;
 /* Απαλή φεγγαρίσια λάμψη */
    overflow: hidden;
    z-index: 2;
}

/* Η σκιά που δημιουργεί την έκλειψη */
#moon-shadow {
    position: absolute;
    top: 0;
    left: 0; /* Ξεκινάει από το 0% (καλύπτει όλο το φεγγάρι = ολική έκλειψη) */
    width: 100%;
    height: 100%;
    background: rgba(10, 10, 15, 0.95); /* Σκούρο χρώμα έκλειψης, ίδιο με το φόντο */
    border-radius: 50%;
    transition: left 0.1s linear; /* Ομαλή κίνηση όταν γεμίζει */
}
/* === ΠΡΟΣΘΕΤΕΤΕ ΑΥΤΟ ΤΟ ΚΟΜΜΑΤΙ ΣΤΟ ΤΕΛΟΣ ΤΟΥ CSS === */
@keyframes pulseGlow {
    0%, 100% {
        /* Η αρχική απαλή ένταση που βάλαμε */
        box-shadow: 0 0 20px 5px rgba(255, 140, 0, 0.4);
    }
    50% {
        /* Το φως δυναμώνει ελαφρώς σε μέγεθος και φωτεινότητα (0.55) */
        box-shadow: 0 0 28px 7px rgba(255, 150, 20, 0.7);
    }
}

<!-- Το Φεγγάρι και η Σκιά της Έκλειψης -->
<div id="moon-container">
    <div id="moon-shadow"></div>

    <!-- Η JavaScript που δημιουργεί τη βροχή αστεριών -->
    <script>let starInterval = null; // Κρατάει τον χρονοδιακόπτη της συνεχούς ροής
let moonProgress = 0;    // Το ποσοστό που έχει γεμίσει το φεγγάρι (από 0 έως 100)

document.getElementById('toggleStars').addEventListener('click', function() {
    const shadow = document.getElementById('moon-shadow');

    if (starInterval === null) {
        // Πρώτο πάτημα (ON): Ξεκινάει η ροή αστεριών
        starInterval = setInterval(function() {
            createStar();
            
            // Όσο πέφτουν τα αστέρια, το φεγγάρι γεμίζει σιγά-σιγά
            if (moonProgress < 100) {
                moonProgress += 0.5; // <-- Αλλάξτε αυτό για να γεμίζει πιο γρήγορα ή πιο αργά
                shadow.style.left = moonProgress + '%'; // Σπρώχνει τη σκιά δεξιά
            }
        }, 250);
    } else {
        // Δεύτερο πάτημα (OFF): Σταματάει η ροή και σβήνουν τα αστέρια
        clearInterval(starInterval);
        starInterval = null;

        const activeStars = document.querySelectorAll('.star');
        activeStars.forEach(function(star) {
            star.remove();
        });

        // ΕΠΑΝΑΦΟΡΑ ΕΚΛΕΙΨΗΣ: Το φεγγάρι αδειάζει ακαριαία μόλις κλείσει ο διακόπτης
        moonProgress = 0;
        shadow.style.left = '0%';
    }
});


        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            
            // Τυχαία οριζόντια θέση στην οθόνη
            star.style.left = Math.random() * 100 + 'vw';
            
            // Τυχαίο μέγεθος αστεριού
            const size = Math.random() * 20 + 10; // Από 10px έως 30px
            star.style.fontSize = size + 'px';
            
            // Τυχαία ταχύτητα πτώσης (διάρκεια animation)
            const duration = Math.random() * 4 + 5; // Από 2s έως 5s
            star.style.animationDuration = duration + 's';
            
            // Προσθήκη στο σώμα της σελίδας
            document.body.appendChild(star);
            
            // Αυτόματη διαγραφή του στοιχείου μόλις τελειώσει το animation
            setTimeout(() => {
                star.remove();
            }, duration * 1000);
        }
    </script><script>
  (function(){
    var message = "𝕸𝖚𝖘𝖎𝖈💕𝕮𝖍𝖔𝖎𝖈ὲ𝖘";

    // Μπλοκάρισμα Δεξιού Κλικ
    document.oncontextmenu = function() { alert(message); return false; };
    document.addEventListener('dragstart', e => e.preventDefault());
    
    // Μπλοκάρισμα Πλήκτρων DevTools & Προβολής Κώδικα
    document.addEventListener('keydown', function(e) {
        // F12
        if (e.keyCode === 123) { e.preventDefault(); return false; }
        // Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U, Ctrl+S, Ctrl+A
        if (e.ctrlKey && (e.shiftKey && (e.keyCode === 73 || e.keyCode === 74) || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 65 || e.keyCode === 67 || e.keyCode === 88)) {
            e.preventDefault();
            return false;
        }
    });

    // Anti-Debugging Loop (Παγώνει τη σελίδα αν ανοίξουν τα DevTools)
    setInterval(function() {
        const start = new Date();
        debugger;
        const end = new Date();
        if (end - start > 100) {
            while (true) { console.log("Security Breach"); }
        }
    }, 500);
  })();
</script>
